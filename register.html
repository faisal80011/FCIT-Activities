<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <title>FCIT Activities | Register</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Create a New Account</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="activities.html">About us</a>
            <a href="#footer-section">Contact Us</a> 

        </nav>
    </header>

    <main>
        <section>
            <form>
                <div style="margin-bottom: 10px;">
                    <label>Full Name:</label><br>
                    <input type="text" placeholder="Full Name" style="width: 80%; padding: 8px;">
                </div>
                <div style="margin-bottom: 10px;">
                    <label>Student ID:</label><br>
                    <input type="text" placeholder="Student ID" style="width: 80%; padding: 8px;">
                </div>
                <div style="margin-bottom: 10px;">
                    <label>KAU Email:</label><br>
                    <input type="email" placeholder="KAU Email" style="width: 80%; padding: 8px;">
                </div>
                <div style="margin-bottom: 10px;">
                    <label>Password</label><br>
                    <input type="password" placeholder="Create Password" style="width: 80%; padding: 8px;">
                </div>
                <div style="margin-bottom: 10px;">
                 <label>Confirm Password:</label><br>
                 <input type="password" placeholder="Confirm Password" style="width: 80%; padding: 8px;">
                </div>
                <button type="button" style="padding: 10px 20px; background: #004a99; color: white; border: none; cursor: pointer;">Register</button>
            </form>
            <p>Already have an account?<a href="login.html"> Login Here</a></p>
            <hr>
            <a href="index.html">← Return to Home</a>
        </section>
    </main>

    <footer style="background: #333; color: white; text-align: center; padding: 20px;">
    <footer id="footer-section" style="background: #333; color: white; text-align: center; padding: 20px;"></footer>
        <p>Contact us: fcit-activities@kau.edu.sa</p>
        <hr>
        <p>© FCIT | KAU Activities 2026</p>
        <p>Developed by: Faisal Alnahdi & Mohammed Albooq</p>
    </footer>
</body>
</html>
