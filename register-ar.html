<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إنشاء حساب جديد | بوابة أنشطة FCIT</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>إنشاء حساب جديد</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="activities.html">About us</a>
            <a href="#footer-section">تواصل معنا</a> 

        </nav>
    </header>

    <main>
        <section>
            <form>
                <div style="direction: rtl; text-align: right;">
                    <label>الاسم الكامل:</label><br>
                    <input type="text" placeholder="Full Name" style="width: 80%; padding: 8px;">
                </div>
                <div style="direction: rtl; text-align: right;">
                    <label>الرقم الجامعي:</label><br>
                    <input type="text" placeholder="Student ID" style="width: 80%; padding: 8px;">
                </div>
                <div style="direction: rtl; text-align: right;">
                    <label>البريد الجامعي:</label><br>
                    <input type="email" placeholder="KAU Email" style="width: 80%; padding: 8px;">
                </div>
                <div style="direction: rtl; text-align: right;">
                    <label>كلمة المرور:</label><br>
                    <input type="password" placeholder="Create Password" style="width: 80%; padding: 8px;">
                </div>
                <div style="direction: rtl; text-align: right;">
                 <label>تأكيد كلمة المرور:</label><br>
                 <input type="password" placeholder="Confirm Password" style="width: 80%; padding: 8px; text-align: right;">
                </div>
                <button type="button" style="padding: 10px 20px; background: #004a99; color: white; border: none; cursor: pointer;">تسجيل</button>
            </form>
            <p>لديك حساب بالفعل؟ <a href="login-ar.html">سجل دخولك هنا</a></p>
            <hr>
            <a href="index-ar.html">← العودة للرئيسية</a>
        </section>
    </main>

    <footer id="footer-section" style="background: #333; color: white; text-align: center; padding: 20px;">
        <p>تواصل معنا: fcit-activities@kau.edu.sa</p>
        <hr>
        <p>© 2026 بوابة أنشطة كلية الحاسبات - KAU</p>
        <p>إعداد: فيصل النهدي & محمد البوق</p>
    </footer>
</body>
</html>
