<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <title>FCIT Activities | Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Login</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="activities.html">About us</a>
            <a href="#footer-section">Contact Us</a> 

        </nav>
    </header>

    <main>
        <section>
            <form>
                    <div style="margin-bottom: 15px;">
                     <label>Username:</label><br>
                     <input type="text" id="username" placeholder="KAU Email or Username" style="width: 80%; padding: 8px;" required>           
                    </div>
                    
                    <div style="margin-bottom: 15px;">
                       <label>Password:</label><br>
                     <input type="password" id="password" placeholder="Password" style="width: 80%; padding: 8px;" required>                    
                    </div>
                 
                 
                 <p id="loginError" style="color: red; font-size: 14px;"></p>

                 <button type="button" onclick="validateLogin()" style="padding: 10px 20px; background: #004a99; color: white; border: none; cursor: pointer;">Login</button>
            </form>
            <p>Don't have account?<a href="register.html"> Sign up now</a></p>
            <hr>
            <a href="index.html">← Return to Home</a>
        </section>
    </main>

    <footer id="footer-section" style="background: #333; color: white; text-align: center; padding: 20px;">
        <p>Contact us: fcit-activities@kau.edu.sa</p>
        <hr>
        <p>© FCIT | KAU Activities 2026</p>
        <p>Developed by: Faisal Alnahdi & Mohammed Albooq</p>
    </footer>


    <script>
     function validateLogin() {
        let username = document.getElementById("username").value;
        let password = document.getElementById("password").value;
        
        let errorMsg = document.getElementById("loginError");
        
        if (username === "" || password === "") {
            // Show error message inside the page
            errorMsg.innerHTML = "❌ Invalid username or password!";
            return false;
        } else {
            // Save username to localStorage
            localStorage.setItem("loggedInUser", username);
            // Redirect to home page
            window.location.href = "index.html";
            return true;
      }
     }
    </script>
       
</body>
</html>
