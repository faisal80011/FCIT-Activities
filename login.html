<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <title>Login | FCIT Activities</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Login Page</h1>
    </header>

    <main>
        <section>
            <form>
                <div style="margin-bottom: 15px;">
                    <label>Username:</label><br>
                    <input type="text" placeholder="KAU Email or Username" style="width: 80%; padding: 8px;" required>
                </div>
                <div style="margin-bottom: 15px;">
                    <label>Password:</label><br>
                    <input type="password" placeholder="Password" style="width: 80%; padding: 8px;" required>
                </div>
                <button type="button" style="padding: 10px 20px; background: #004a99; color: white; border: none; cursor: pointer;">Login</button>
            </form>
            <p>Don't have an account?<a href="register.html"> Sign up now</a></p>
            <hr>
            <a href="index.html">← Return to Home</a>
        </section>
    </main>

    <footer style="background: #333; color: white; text-align: center; padding: 20px;">
        <p>Contact us: fcit-activities@kau.edu.sa</p>
        <hr>
        <p>© FCIT | KAU Activities</p>
        <p>Developed by: Faisal Alnahdi & Mohammed Albooq</p>
    </footer>
</body>
</html>
