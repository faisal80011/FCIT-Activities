<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول | FCIT Activities</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>تسجيل الدخول</h1>
        <nav>
            <a href="index-ar.html">الرئيسية</a>
            <a href="activities-ar.html">نظرة عامة</a>
            <a href="#footer-section">تواصل معنا</a> 

        </nav>
    </header>

    <main>
        <section>
            <form>
                <div style="direction: rtl; text-align: right;">
                     <label>اسم المستخدم أو البريد:</label><br>
                     <input type="text" id="username" placeholder="KAU Email or Username" style="width: 80%; padding: 8px;" required>           
                </div>
                
                <div style="direction: rtl; text-align: right;">
                    <label>كلمة المرور:</label><br>
                     <input type="password" id="password" placeholder="Password" style="width: 80%; padding: 8px;" required>                    
                </div>
                    <p id="loginError" style="color: red; font-size: 14px;"></p>
                 <button type="button" onclick="validateLogin()" style="padding: 10px 20px; background: #004a99; color: white; border: none; cursor: pointer;">دخول</button>
            </form>
            <p>ليس لديك حساب؟ <a href="register-ar.html">أنشئ حساباً الآن</a></p>
            <hr>
            <a href="index-ar.html">← العودة للرئيسية</a>
        </section>
    </main>

    <footer id="footer-section" style="background: #333; color: white; text-align: center; padding: 20px;">
        <p>تواصل معنا: fcit-activities@kau.edu.sa</p>
        <hr>
        <p>© 2026 بوابة أنشطة كلية الحاسبات - KAU</p>
        <p>إعداد: فيصل النهدي & محمد البوق</p>
    </footer>
    
    
    <script>
     function validateLogin() {
        let username = document.getElementById("username").value;
        let password = document.getElementById("password").value;
        
        let errorMsg = document.getElementById("loginError");
        
        if (username === "" || password === "") {
            errorMsg.innerHTML = "اسم المستخدم أو كلمة المرور غير صحيحة";
            return false;
        } else {
            localStorage.setItem("loggedInUser", username);
            window.location.href = "index.html";
            return true;
      }
     }
    </script>
</body>
</html>
